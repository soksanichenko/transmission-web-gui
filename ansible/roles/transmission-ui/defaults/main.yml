---
transmission_ui_app_dir: "{{ docker_volumes_directory }}/transmission-ui"

transmission_ui_config_api_name: 'transmission-ui-config-api'
transmission_ui_config_api_image: 'transmission-ui-config-api'
transmission_ui_config_api_port: 8095

# Connection settings written to the initial config.json (not overwritten after first deploy)
transmission_ui_rpc_url: '/transmission/rpc'
transmission_ui_rpc_username: ''
transmission_ui_rpc_password: ''

# Nginx — defaults match infra's nginx role
nginx_docker_container_name: 'nginx-server'
nginx_confd_container_path: '/etc/nginx/conf.d'
nginx_volumes_path: "{{ docker_volumes_directory }}/nginx"
nginx_confd_path: "{{ nginx_volumes_path }}/conf.d"
nginx_html_path: "{{ nginx_volumes_path }}/html"
nginx_custom_upstream_path: "{{ nginx_confd_path }}/custom-upstream"
nginx_domain_custom_locations_path: "{{ nginx_confd_path }}/homeserver.zelgray.work-custom-locations"
nginx_htpasswd_path: "{{ nginx_confd_path }}/htpasswd"
...
