services:
  frontend:
    image: nginx:alpine
    volumes:
      - ./frontend/dist:/usr/share/nginx/html/transmission-ui:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - config_data:/data
    ports:
      - "8080:80"
    depends_on:
      - config-api

  config-api:
    build: ./backend
    volumes:
      - config_data:/data
    environment:
      CONFIG_PATH: /data/config.json
    restart: unless-stopped

volumes:
  config_data:
