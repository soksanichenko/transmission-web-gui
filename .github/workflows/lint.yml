---
name: Lint

on:
  push:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  ruff:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run ruff check
        uses: astral-sh/ruff-action@v3
        with:
          args: "check backend/"

      - name: Run ruff format check
        uses: astral-sh/ruff-action@v3
        with:
          args: "format --check backend/"
