# Local development only — used by docker-compose.yml.
# In production, nginx is managed by the infra repo; the Ansible role
# drops location/upstream configs into the shared nginx container.
server {
    listen 80;

    # Auth for the whole UI (Ansible sets this up with htpasswd)
    # auth_basic "Transmission";
    # auth_basic_user_file /etc/nginx/htpasswd;

    # Transmission RPC proxy
    location /transmission/rpc {
        proxy_pass http://host.docker.internal:9091;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Config API backend
    location /transmission-ui/api/ {
        proxy_pass http://config-api:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Static frontend — config.json served from shared volume
    location /transmission-ui/config.json {
        alias /data/config.json;
        default_type application/json;
        add_header Cache-Control "no-cache";
    }

    # Static frontend files
    location /transmission-ui/ {
        alias /usr/share/nginx/html/transmission-ui/;
        try_files $uri $uri/ /transmission-ui/index.html;
    }
}
